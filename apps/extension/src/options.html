<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedCheck Settings</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="options">
      <h1>MedCheck Settings</h1>
      <p>Configure source policy and proxy behavior for local runs.</p>

      <form id="settingsForm" class="form">
        <label>
          Claim limit
          <input id="claimLimit" name="claimLimit" type="number" min="1" max="12" required />
        </label>

        <label>
          Minimum citations
          <input id="minCitations" name="minCitations" type="number" min="1" max="5" required />
        </label>

        <label class="checkbox">
          <input id="requirePrimarySource" name="requirePrimarySource" type="checkbox" />
          Require at least one primary medical source
        </label>

        <label class="checkbox">
          <input id="strictWhitelist" name="strictWhitelist" type="checkbox" />
          Enforce whitelist-only citations
        </label>

        <label>
          Proxy base URL
          <input id="proxyBaseUrl" name="proxyBaseUrl" type="url" required />
        </label>

        <label>
          Allowed domains (comma or newline separated)
          <textarea id="allowedDomains" name="allowedDomains" rows="8"></textarea>
        </label>

        <label>
          Primary domains (comma or newline separated)
          <textarea id="primaryDomains" name="primaryDomains" rows="6"></textarea>
        </label>

        <div class="actions">
          <button type="submit">Save settings</button>
          <button id="resetBtn" type="button">Reset defaults</button>
        </div>
      </form>

      <p id="saveStatus" class="save-status"></p>
    </main>

    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
